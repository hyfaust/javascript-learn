<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可选链与空值合并</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔗 可选链 (?.) 与空值合并 (??)</h1>
        <p class="subtitle">ES2020 引入的安全访问操作符</p>

        <!-- 可选链演示 -->
        <section class="demo-section">
            <h2>可选链 (Optional Chaining)</h2>

            <div class="demo-box">
                <h3>1. 安全访问属性</h3>
                <button class="demo-btn" data-action="optional-property">运行演示</button>
                <div id="optional-property-result" class="demo-result"></div>
            </div>

            <div class="demo-box">
                <h3>2. 安全调用方法</h3>
                <button class="demo-btn" data-action="optional-method">运行演示</button>
                <div id="optional-method-result" class="demo-result"></div>
            </div>

            <div class="demo-box">
                <h3>3. 安全访问数组</h3>
                <button class="demo-btn" data-action="optional-index">运行演示</button>
                <div id="optional-index-result" class="demo-result"></div>
            </div>
        </section>

        <!-- 空值合并演示 -->
        <section class="demo-section">
            <h2>空值合并 (Nullish Coalescing)</h2>

            <div class="demo-box">
                <h3>4. ?? vs || 的区别</h3>
                <button class="demo-btn" data-action="nullish-vs-or">运行演示</button>
                <div id="nullish-vs-or-result" class="demo-result"></div>
            </div>

            <div class="demo-box">
                <h3>5. 链式空值合并</h3>
                <button class="demo-btn" data-action="chained-nullish">运行演示</button>
                <div id="chained-nullish-result" class="demo-result"></div>
            </div>
        </section>

        <!-- 实际应用 -->
        <section class="demo-section">
            <h2>实际应用场景</h2>

            <div class="demo-box">
                <h3>6. 安全访问 API 响应</h3>
                <button class="demo-btn" data-action="api-access">运行演示</button>
                <div id="api-access-result" class="demo-result"></div>
            </div>

            <div class="demo-box">
                <h3>7. 对象浏览器</h3>
                <input type="text" id="object-path" placeholder="输入路径，如: user.profile.name" value="user.profile.name">
                <button class="demo-btn" data-action="object-explorer">访问</button>
                <div id="object-explorer-result" class="demo-result"></div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
