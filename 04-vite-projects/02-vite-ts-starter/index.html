<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + TypeScript</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <h1>🔷 Vite + TypeScript</h1>
      <p class="subtitle">Type-safe JavaScript with Vite's lightning-fast build</p>

      <div class="card">
        <h2>Type Demo</h2>
        <div id="type-demo"></div>
      </div>

      <div class="card">
        <h2>Generic Stack</h2>
        <div class="stack-controls">
          <input type="text" id="stack-input" placeholder="Push a value..." />
          <button id="push-btn">Push</button>
          <button id="pop-btn">Pop</button>
        </div>
        <div id="stack-display" class="stack-display"></div>
      </div>

      <div class="card">
        <h2>User Profile Validator</h2>
        <form id="profile-form">
          <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name-input" placeholder="Enter name" />
          </div>
          <div class="form-group">
            <label>Age:</label>
            <input type="number" id="age-input" placeholder="Enter age" />
          </div>
          <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email-input" placeholder="Enter email" />
          </div>
          <button type="submit">Validate</button>
        </form>
        <div id="validation-result"></div>
      </div>

      <div class="info">
        <p>Edit <code>src/main.ts</code> — TypeScript errors show in your editor and terminal!</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
